<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Project</title>
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Merriweather&family=Nunito&family=Open+Sans&family=Playfair+Display&family=Roboto&family=Source+Code+Pro&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title-row">
                    <h2>📝 Notes Project</h2>
                    <!-- Settings button -->
                    <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
                    
                    <!-- Settings Menu -->
                    <div class="settings-menu" id="settingsMenu">
                        <div class="dropdown-section">
                            <div class="dropdown-item">
                                <span>🌙 Dark mode</span>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="darkModeToggle">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="dropdown-divider"></div>
                        
                        <div class="dropdown-section">
                            <div class="dropdown-item" id="logoutOption">
                                <span>🚪 Logout</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button id="newNoteBtn" class="new-note-btn">+ Create New Note</button>

                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search notes...">
            </div>
            
            <div class="notes-list" id="sidebarNotesList">
                <!-- Notes list will appear here -->
            </div>
        </aside>    

        <!-- Main Editor Area -->
        <main class="editor-container">
            <div class="editor-placeholder" id="editorPlaceholder">
                <h2>Select a note or create a new one</h2>
            </div>
            
            <!-- Actions Menu -->
            <div class="actions-menu" id="actionsMenu">
                    <div class="dropdown-section">
                        <div class="dropdown-item" id="duplicateNoteOption">
                            <span>📄 Duplicate</span>
                            <span class="shortcut">Ctrl+D</span>
                        </div>
                        <div class="dropdown-item" id="exportNoteOption">
                                <span>⬇️ Export</span>
                        </div>
                    </div>
                        
                    <div class="dropdown-divider"></div>
                        
                    <div class="dropdown-section">
                        <div class="dropdown-item" id="deleteNoteOption">
                            <span>🗑️ Delete note</span>
                     </div>
                </div>
            </div>
            
            <!-- Block Menu (per-line, opens with ⠿) -->
            <div class="block-menu dropdown-menu" id="blockMenu">
                <div class="dropdown-section">
                    <div class="dropdown-item" id="blockBulletedList">
                        <span>• Bulleted list</span>
                    </div>
                    <div class="dropdown-item" id="blockNumberedList">
                        <span>1. Numbered list</span>
                    </div>
                    <div class="dropdown-item" id="blockToDoList">  
                        <span>✓ To-do List</span>
                    </div>
                </div>
            </div>

            <div class="editor-content" id="editorContent" style="display: none;">
                <div class="note-actions">
                    <button class="toolbar-btn favorite-btn" id="favoriteBtn">
                        ☆
                    </button>

                    <button class="toolbar-btn actions-btn" id="actionsBtn">
                        ⋯
                    </button>
                </div>

                <input 
                    type="text" 
                    id="noteTitle" 
                    class="note-title-input" 
                    placeholder="Untitled"
                >
                <div 
                    id="noteContent" 
                    class="note-content-input"
                    data-placeholder="Start writing..."
                ></div>
            </div>
        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
