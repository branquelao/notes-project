<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Project</title>
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📝 Notes Project</h2>
                <button id="newNoteBtn" class="new-note-btn">+ Create New Note</button>

                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search notes...">
                    
            </div>
            
            <div class="notes-list" id="sidebarNotesList">
                <!-- Notes list will appear here -->
            </div>
        </aside>

        <!-- Main Editor Area -->
        <main class="editor-container">
            <div class="editor-placeholder" id="editorPlaceholder">
                <h2>Select a note or create a new one</h2>
            </div>

            <div class="editor-content" id="editorContent" style="display: none;">
                <!-- Top Bar with Menu -->
                <div class="editor-top-bar">
                    <div class="editor-top-bar-left"></div>
                    <div class="editor-top-bar-right">
                        <button class="menu-btn" id="menuBtn">⋯</button>
                        
                        <!-- Dropdown Menu -->
                        <div class="dropdown-menu" id="dropdownMenu">
                            <div class="dropdown-section">
                                <div class="dropdown-item">
                                    <span>🌙 Dark mode</span>
                                    <label class="toggle-switch">
                                        <input type="checkbox" id="darkModeToggle">
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                            </div>
                            
                            <div class="dropdown-divider"></div>
                            
                            <div class="dropdown-section">
                                <div class="dropdown-item font-option" data-font="default">
                                    <span class="font-preview" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;">Ag</span>
                                    <span>Default</span>
                                </div>
                                <div class="dropdown-item font-option" data-font="serif">
                                    <span class="font-preview" style="font-family: 'Georgia', serif;">Ag</span>
                                    <span>Serif</span>
                                </div>
                                <div class="dropdown-item font-option" data-font="mono">
                                    <span class="font-preview" style="font-family: 'Courier New', monospace;">Ag</span>
                                    <span>Mono</span>
                                </div>
                            </div>
                            
                            <div class="dropdown-divider"></div>
                            
                            <div class="dropdown-section">
                                <div class="dropdown-item">
                                    <span>Small text</span>
                                    <label class="toggle-switch">
                                        <input type="checkbox" id="smallTextToggle">
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                                <div class="dropdown-item">
                                    <span>Full width</span>
                                    <label class="toggle-switch">
                                        <input type="checkbox" id="fullWidthToggle">
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                            </div>
                            
                            <div class="dropdown-divider"></div>
                            
                            <div class="dropdown-section">
                                <div class="dropdown-item" id="deleteNoteOption">
                                    <span>🗑️ Delete note</span>
                                </div>
                                <div class="dropdown-item" id="duplicateNoteOption">
                                    <span>📄 Duplicate</span>
                                    <span class="shortcut">Ctrl+D</span>
                                </div>
                            </div>
                            
                            <div class="dropdown-divider"></div>
                            
                            <div class="dropdown-section">
                                <div class="dropdown-item" id="exportNoteOption">
                                    <span>⬇️ Export</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Formatting Toolbar -->
                <div class="toolbar">
                    <button class="toolbar-btn" data-command="bold" title="Bold (Ctrl+B)">
                        <strong>B</strong>
                    </button>
                    <button class="toolbar-btn" data-command="italic" title="Italic (Ctrl+I)">
                        <em>I</em>
                    </button>
                    <button class="toolbar-btn" data-command="underline" title="Underline (Ctrl+U)">
                        <u>U</u>
                    </button>
                    <button class="toolbar-btn" data-command="strikeThrough" title="Strikethrough">
                        <s>S</s>
                    <button class="toolbar-btn" id="createLinkBtn" title="Insert Link">
                        🔗
                    </button>
                    <button class="toolbar-btn" id="insertImageBtn" title="Insert Image">
                        🖼️
                    </button>
                
                    <div class="toolbar-separator"></div>
                    
                    <button class="toolbar-btn" data-command="insertUnorderedList" title="Bullet List">
                        ☰
                    </button>
                    <button class="toolbar-btn" data-command="insertOrderedList" title="Numbered List">
                        ≡
                    </button>
                    
                    <div class="toolbar-separator"></div>
                    
                    <button class="toolbar-btn" data-command="removeFormat" title="Clear Formatting">
                        ✕
                    </button>
                </div>

                <input 
                    type="text" 
                    id="noteTitle" 
                    class="note-title-input" 
                    placeholder="Untitled"
                >
                
                <div 
                    id="noteContent" 
                    class="note-content-input" 
                    contenteditable="true"
                    data-placeholder="Start writing..."
                ></div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
